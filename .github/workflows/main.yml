name: Agentic SCM Investor Pipeline V2.1

on:
  workflow_dispatch: # 수동 가동 버튼 활성화
  schedule:
    - cron: '0 22 * * *' # 매일 밤 10시 (KST 아침 7시) 자동 가동

jobs:
  analyze_market:
    runs-on: ubuntu-latest
    permissions:
      contents: write # HTML 동적 연동을 위한 JSON 커밋 권한 필수 부여

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 시스템 안정화 버전 고정

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install google-genai requests

      - name: Run V2.1 Main Engine
        env:
          # API Keys (원재료 수급용)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KIS_API_KEY: ${{ secrets.KIS_API_KEY }}
          KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          
          # Telegram Andon & Delivery API (배송 및 비상벨용)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main_engine.py

      - name: Archive JSON for UI Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/analysis_history.json || true
          git commit -m "📊 Auto-update V2.1 JSON for HTML Dashboard [skip ci]" || true
          git push || true
