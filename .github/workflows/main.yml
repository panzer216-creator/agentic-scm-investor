name: Agentic SCM Engine Runner

on:
  # [Track 1] 평일 매일 오전 8시 자동 실행 (KST 기준)
  # UTC 기준으로는 전날 23:00 입니다. (일~목 23:00 UTC = 월~금 08:00 KST)
  schedule:
    - cron: '0 23 * * 0-4'
    
  # [Track 2] 수동 실행 트리거 (HTML 대시보드 버튼용)
  workflow_dispatch:
    inputs:
      run_mode:
        description: '실행 모드 (MANUAL: LLM 심층 분석, AUTO: 무료 감시)'
        required: true
        default: 'MANUAL'
        type: choice
        options:
          - MANUAL
          - AUTO

jobs:
  run-scm-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 데이터 저장을 위한 쓰기 권한

    steps:
      - name: 📥 소스 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 환경 설정 (3.10)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 필요 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests # 필요한 다른 패키지가 있다면 띄어쓰기로 추가하세요

      - name: 🚀 SCM 메인 엔진 가동
        env:
          # github.event.inputs.run_mode가 없으면(즉, 스케줄로 자동 실행되면) 'AUTO'로 작동
          RUN_MODE: ${{ github.event.inputs.run_mode || 'AUTO' }}
          
          # API 키 및 시크릿 (GitHub Settings > Secrets에 등록된 값)
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 필요시 주석 해제
        run: |
          python main_engine.py

      - name: 💾 분석 결과 (JSON) 자동 저장 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action SCM Bot"
          git add data/
          git diff-index --quiet HEAD || (git commit -m "✅ SCM 매트릭스 데이터 업데이트" && git push)
