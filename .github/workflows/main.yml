<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산업 병목 추적 & 투자 매트릭스 v2.2</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #d35400; --red: #c62828; --green: #2e7d32; --border: #333; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 700px; margin: 0 auto; }
        
        .group-title { font-size: 1.3em; font-weight: bold; color: var(--accent); margin: 25px 0 10px 0; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        /* 아코디언(접기/펴기) 스타일 */
        details { background: var(--card); border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; }
        summary { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; list-style: none; font-size: 1.1em; font-weight: bold; }
        summary::-webkit-details-marker { display: none; }
        
        .action-tag { padding: 6px 14px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        .tag-buy { background: #7f0000; color: #fff; }
        .tag-wait { background: #444; color: #ccc; }

        .content { padding: 0 18px 18px 18px; border-top: 1px solid var(--border); }
        
        /* 육각형 지표 그리드 */
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .m-box { background: #262626; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .m-label { font-size: 0.65em; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        .m-value { font-size: 1.05em; font-weight: bold; color: #fff; }

        /* 타점 및 논리 박스 */
        .target-area { margin-top: 15px; }
        .t-box { padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9em; display: flex; align-items: flex-start; }
        .t-buy { background: rgba(46, 125, 50, 0.1); border: 1px solid var(--green); }
        .t-sell { background: rgba(198, 40, 40, 0.1); border: 1px solid var(--red); }
        .t-icon { margin-right: 10px; font-size: 1.1em; }
        
        .logic-box { background: #262626; padding: 15px; border-radius: 8px; font-size: 0.9em; line-height: 1.5; color: #ccc; border-left: 4px solid #1976d2; margin-top: 10px; }
        .logic-title { font-weight: bold; color: #fff; margin-bottom: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#fff;">🏗️ 산업 병목 & 투자 매트릭스</h2>
        <div id="dashboard"></div>
    </div>

    <script>
        async function renderDashboard() {
            try {
                const data = await (await fetch('data/analysis_history.json?t=' + Date.now())).json();
                const container = document.getElementById('dashboard');
                
                const groups = {};
                data.forEach(item => { 
                    if(!groups[item.group_id]) groups[item.group_id] = []; 
                    groups[item.group_id].push(item); 
                });

                Object.keys(groups).sort().forEach(gId => {
                    let html = `<div class="group-title">${gId}</div>`;
                    
                    groups[gId].forEach(item => {
                        const m = item.ui_metrics || {};
                        const conc = item.conclusion || {};
                        const action = conc.Action || "관망";
                        const badgeClass = action.includes('매수') ? 'tag-buy' : 'tag-wait';
                        
                        html += `
                        <details>
                            <summary>
                                <span>${item.company_name} <small style="color:#888; font-weight:normal;">[${item.stock_code}]</small></span>
                                <span class="action-tag ${badgeClass}">${action}</span>
                            </summary>
                            
                            <div class="content">
                                <div class="metrics-grid">
                                    <div class="m-box"><div class="m-label">PBR / OPM YoY</div><div class="m-value">${m.pbr_opm || 'N/A'}</div></div>
                                    <div class="m-box"><div class="m-label">수주잔고비율</div><div class="m-value">${m.backlog || 'N/A'}</div></div>
                                    <div class="m-box"><div class="m-label">재고회전율</div><div class="m-value">${m.turnover || 'N/A'}</div></div>
                                    <div class="m-box"><div class="m-label">RSI(14)</div><div class="m-value">${m.rsi || '50'}</div></div>
                                    <div class="m-box"><div class="m-label">RS SCORE</div><div class="m-value">${m.rs_score || '1.0'}</div></div>
                                    <div class="m-box"><div class="m-label">SMART MONEY</div><div class="m-value" style="font-size:0.85em;">${m.smart_money || '분석중'}</div></div>
                                </div>

                                <div class="target-area">
                                    <div class="t-box t-buy">
                                        <div class="t-icon">🟢</div>
                                        <div><strong>매수 타점:</strong> ${item.buy_target || '데이터 없음'}</div>
                                    </div>
                                    <div class="t-box t-sell">
                                        <div class="t-icon">🔴</div>
                                        <div><strong>매도 타점:</strong> ${item.sell_target || '데이터 없음'}</div>
                                    </div>
                                    
                                    <div class="logic-box">
                                        <div class="logic-title">📝 왜 이 기업이 병목인가?</div>
                                        ${item.bottleneck_logic || '공급망 병목 사유 분석 누락'}
                                    </div>
                                </div>
                            </div>
                        </details>`;
                    });
                    container.innerHTML += html;
                });
            } catch (e) {
                document.getElementById('dashboard').innerHTML = '<p style="color:red; text-align:center;">데이터를 불러오는 중 오류가 발생했습니다.</p>';
            }
        }
        window.onload = renderDashboard;
    </script>
</body>
</html>
