name: Agentic-Investment-System-V1

on:
  schedule:
    # 한국 시간(KST) 매일 오전 7시 실행 (UTC 22:00)
    - cron: '0 22 * * 0-4' 
  workflow_dispatch: # 필요 시 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas finance-datareader google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests

      - name: Run Analysis Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          # 구글 서비스 계정 JSON도 secrets에 저장되어 있어야 함
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py
