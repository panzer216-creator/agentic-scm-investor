name: Agentic SCM Investor Pipeline V2.2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5'

# 창고 입고(Push)를 위한 쓰기 권한 명시
permissions:
  contents: write

jobs:
  analyze_market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run V2.2 Main Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_CANO: ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python main_engine.py

      - name: Commit and Push Data (유연한 물류 배송)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # data 폴더에 국한하지 않고 변경된 모든 것을 장바구니에 담음
          git add .
          
          # 스마트 커밋: 변경 사항이 없으면 부드럽게 스킵, 에러가 나도 공정 실패(Red) 처리하지 않음
          git diff --staged --quiet || (git commit -m "Auto-update V2.2 SCM data" && git push) || true
