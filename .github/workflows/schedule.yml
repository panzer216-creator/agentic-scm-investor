name: Daily Stock Briefing

on:
  schedule:
    # 한국 시간(KST) 매일 아침 8시 30분에 실행 (UTC 기준 전날 밤 11시 30분)
    # 0-4는 일요일~목요일(UTC)을 의미하며, 한국 시간으로는 월요일~금요일 아침이 됩니다.
    - cron: '30 23 * * 0-4'
  workflow_dispatch: # 버튼을 눌러 수동으로 즉시 실행할 수 있게 해주는 옵션

jobs:
  build:
    runs-on: ubuntu-latest # 최신 리눅스 서버 환경 대여

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 필요 부품(패키지) 설치
      run: |
        python -m pip install --upgrade pip
        pip install finance-datareader pandas google-generativeai python-telegram-bot python-dotenv

    - name: 4. 브리핑 시스템 가동
      env:
        # GitHub 비밀 금고에서 마스터 키를 꺼내와 주입
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python daily_briefing.py
