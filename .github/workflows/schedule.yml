name: Daily Stock Briefing V6

on:
  schedule:
    - cron: '0 7 * * 1-5' # KST 16:00 (장 마감 후 결산)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 시스템 엔진 및 부품 설치 (DART, RSS 추가)
      run: |
        python -m pip install --upgrade pip
        # 여기에 opendartreader와 feedparser가 반드시 추가되어야 합니다.
        pip install finance-datareader pandas google-generativeai python-telegram-bot python-dotenv gspread opendartreader feedparser

    - name: 4. V6.0 브리핑 파이프라인 가동
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        DART_API_KEY: ${{ secrets.DART_API_KEY }} # DART 출입증 추가
      run: python daily_briefing.py
