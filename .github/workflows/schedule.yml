name: Daily Stock Briefing

on:
  schedule:
    # 한국 시간(KST) 평일 오후 16시 00분 (장 마감 후 확정 데이터 결산)
    # UTC 기준 07:00 (1-5: 월~금)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 필요 부품 설치
      run: |
        python -m pip install --upgrade pip
        pip install finance-datareader pandas google-generativeai python-telegram-bot python-dotenv gspread

    - name: 4. 브리핑 시스템 가동
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: python daily_briefing.py
