<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산업 병목 추적 & 투자 매트릭스 v2.2 (Dynamic)</title>
    <style>
        /* [기존 스타일 유지] */
        :root {
            --primary: #2c3e50; --accent: #e67e22; --bg: #f5f7fa;
            --card: #ffffff; --border: #dcdde1; --text: #2f3640;
            --strong-buy: #eb4d4b; --buy: #2ecc71; --wait: #95a5a6;
            --box-bg: #f9f9f9; --why-bg: #ecf0f1; --th-bg: #f8f9fa;
            --target-buy-bg: #e8f8f5; --target-sell-bg: #fdedec;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #74b9ff; --accent: #fdcb6e; --bg: #1e272e;
                --card: #2d3436; --border: #4a4a4a; --text: #dfe6e9;
                --box-bg: #353b48; --why-bg: #2d3436; --th-bg: #2d3436;
                --target-buy-bg: rgba(46, 204, 113, 0.15); --target-sell-bg: rgba(235, 77, 75, 0.15);
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); padding: 15px; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header h1 { font-size: 1.4rem; color: var(--primary); }
        
        /* [Andon Alert Style] */
        .andon-banner { display: none; background: #ff7675; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; border-left: 10px solid #d63031; font-size: 0.85rem; }

        .info-box { background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--primary); border-radius: 8px; padding: 15px; margin-bottom: 25px; font-size: 0.85rem; }
        .group-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 30px; border: 1px solid var(--border); }
        .group-header h2 { font-size: 1.2rem; color: var(--primary); border-left: 6px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
        .item-row { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card); margin-bottom: 8px; }
        .item-top { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; }
        .corp-name { font-weight: bold; font-size: 1.05rem; }
        .hot-tag { background: rgba(235, 77, 75, 0.15); color: var(--strong-buy); font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; margin-left: 5px; font-weight: 900; }
        .status-pill { font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; color: #fff; font-weight: bold; }
        .item-content { padding: 15px; background: var(--box-bg); border-top: 1px solid var(--border); }
        .grid-data { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .data-box { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 6px; text-align: center; }
        .label { font-size: 0.6rem; color: var(--wait); display: block; margin-bottom: 2px; }
        .val { font-size: 0.85rem; font-weight: bold; color: var(--primary); }
        .slider-track { height: 8px; background: linear-gradient(to right, var(--buy) 0%, #f1c40f 50%, var(--strong-buy) 100%); border-radius: 4px; position: relative; margin: 12px 0; }
        .slider-ptr { width: 4px; height: 16px; background: var(--text); position: absolute; top: -4px; border: 1px solid #fff; transition: left 0.5s ease; }
        .why-box { background: var(--why-bg); padding: 12px; border-radius: 8px; font-size: 0.8rem; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .target-box { padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 6px; border: 1px solid var(--border); }
        .target-buy { background: var(--target-buy-bg); border-left: 4px solid var(--buy); }
        .target-sell { background: var(--target-sell-bg); border-left: 4px solid var(--strong-buy); }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>🏗️ 산업 병목 추적 & 투자 매트릭스 v2.2</h1>
        <p id="update-time" style="font-size: 0.7rem; color: var(--wait);"></p>
    </header>

    <div id="andon-banner" class="andon-banner"></div>

    <div class="info-box">
        <b>💡 V2.2 오케스트레이터:</b> 백엔드 에이전트의 교차 분석과 SCM 리스크 스코어를 결합하여 <b>기계적 자산 배분</b> 한도를 산출합니다.
    </div>

    <div class="group-card">
        <div class="group-header"><h2>실시간 분석 리포트</h2></div>
        <div id="dynamic-list">
            <p style="text-align:center; padding:20px;">데이터를 불러오는 중...</p>
        </div>
    </div>
</div>

<script>
    async function loadAnalysis() {
        const listContainer = document.getElementById('dynamic-list');
        const andonBanner = document.getElementById('andon-banner');
        const updateTime = document.getElementById('update-time');

        try {
            // 깃허브 저장소의 JSON 경로 (상대 경로)
            const response = await fetch('./data/analysis_history.json');
            const history = await response.json();
            
            // 가장 최근 데이터 추출
            const data = history[history.length - 1];

            // 1. 업데이트 시간 표시
            updateTime.innerText = `Last Updated: ${new Date(data.timestamp).toLocaleString()}`;

            // 2. Andon 알림 처리
            if (data.plan_b_alerts && data.plan_b_alerts.length > 0) {
                andonBanner.style.display = 'block';
                andonBanner.innerHTML = data.plan_b_alerts.map(a => `• ${a}`).join('<br>');
            }

            // 3. 메인 콘텐츠 렌더링
            const pillColor = data.conclusion.Action.includes('매수') ? 'var(--buy)' : 'var(--strong-buy)';
            
            listContainer.innerHTML = `
                <div class="item-row">
                    <div class="item-top">
                        <div class="corp-name">${data.company_name} <span class="hot-tag">${data.strategy_tag}</span></div>
                        <div class="status-pill" style="background:${pillColor}">${data.conclusion.Action}</div>
                    </div>
                    <div class="item-content">
                        <div class="grid-data">
                            <div class="data-box"><span class="label">PER/PBR</span><span class="val">${data.ui_metrics.per_pbr}</span></div>
                            <div class="data-box"><span class="label">RSI(14)</span><span class="val">${data.ui_metrics.rsi}</span></div>
                            <div class="data-box"><span class="label">PEG</span><span class="val">${data.ui_metrics.peg}</span></div>
                            <div class="data-box"><span class="label">OPM YoY</span><span class="val">${data.ui_metrics.opm_yoy}</span></div>
                            <div class="data-box"><span class="label">수주잔고비율</span><span class="val">${data.ui_metrics.order_backlog}</span></div>
                            <div class="data-box"><span class="label">스마트 머니</span><span class="val">${data.ui_metrics.smart_money}</span></div>
                        </div>

                        <div class="slider-container">
                            <span class="label" style="text-align:center">리스크 게이지 및 비중 한도 (Max Cap: ${data.conclusion.Max_Weight})</span>
                            <div class="slider-track">
                                <div class="slider-ptr" style="left:${data.conclusion.Gauge_Bar}%"></div>
                            </div>
                            <div style="display:flex;justify-content:space-between;font-size:0.6rem"><span>Low Risk</span><span>High Risk</span></div>
                        </div>

                        <div class="why-box">
                            <strong>📝 AI 분석 논리:</strong><br>
                            ${data.reasoning.join('<br>')}
                        </div>

                        <div class="target-box target-buy">🎯 <b>권장 비중 가이드:</b> ${data.conclusion.Max_Weight} 이내 편입 권장</div>
                    </div>
                </div>
            `;
        } catch (error) {
            listContainer.innerHTML = `<p style="color:red; text-align:center;">데이터 로드 실패: 백엔드 분석 로그를 확인하세요.</p>`;
            console.error(error);
        }
    }

    document.addEventListener("DOMContentLoaded", loadAnalysis);
</script>
</body>
</html>
