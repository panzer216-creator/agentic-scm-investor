<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic SCM Investor Dashboard v2.2</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #e67e22; --bg: #f5f7fa;
            --card: #ffffff; --border: #dcdde1; --text: #2f3640;
            --strong-buy: #eb4d4b; --buy: #2ecc71; --wait: #95a5a6;
            --box-bg: #f9f9f9; --why-bg: #ecf0f1; --th-bg: #f8f9fa;
            --target-buy-bg: #e8f8f5; --target-sell-bg: #fdedec;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #74b9ff; --accent: #fdcb6e; --bg: #1e272e;
                --card: #2d3436; --border: #4a4a4a; --text: #dfe6e9;
                --box-bg: #353b48; --why-bg: #2d3436; --th-bg: #2d3436;
                --target-buy-bg: rgba(46, 204, 113, 0.15); --target-sell-bg: rgba(235, 77, 75, 0.15);
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); padding: 15px; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header h1 { font-size: 1.4rem; color: var(--primary); }
        
        .andon-banner { display: none; background: #ff7675; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; border-left: 10px solid #d63031; font-size: 0.85rem; }
        
        .group-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 30px; border: 1px solid var(--border); }
        .group-header h2 { font-size: 1.2rem; color: var(--primary); border-left: 6px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
        
        .item-row { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card); margin-bottom: 12px; }
        .item-top { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; cursor: pointer; transition: background 0.2s; }
        .item-top:hover { background: var(--box-bg); }
        .corp-name { font-weight: bold; font-size: 1.05rem; }
        .status-pill { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; color: #fff; font-weight: bold; }

        .item-content { display: none; padding: 15px; background: var(--box-bg); border-top: 1px solid var(--border); }
        .item-content.active { display: block; }
        
        .grid-data { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .data-box { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 6px; text-align: center; }
        .label { font-size: 0.6rem; color: var(--wait); display: block; margin-bottom: 2px; }
        .val { font-size: 0.85rem; font-weight: bold; color: var(--primary); }

        .slider-track { height: 8px; background: linear-gradient(to right, var(--buy) 0%, #f1c40f 50%, var(--strong-buy) 100%); border-radius: 4px; position: relative; margin: 12px 0; }
        .slider-ptr { width: 4px; height: 16px; background: var(--text); position: absolute; top: -4px; border: 1px solid #fff; transition: left 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .why-box { background: var(--why-bg); padding: 12px; border-radius: 8px; font-size: 0.8rem; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .target-box { padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 6px; border: 1px solid var(--border); background: var(--target-buy-bg); border-left: 4px solid var(--buy); }

        .empty-msg { text-align: center; color: var(--wait); padding: 20px; font-size: 0.8rem; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>🏗️ 산업 병목 추적 & 투자 매트릭스 v2.2</h1>
        <p id="update-ts" style="font-size: 0.65rem; color: var(--wait); margin-top: 5px;"></p>
    </header>

    <div id="andon-banner" class="andon-banner"></div>

    <!-- 전략 그룹 섹션 (백엔드의 group_id와 매핑됨) -->
    <div class="group-card">
        <div class="group-header"><h2>A. 디지털 고도화 (HBM/AI)</h2></div>
        <div id="list-a" class="item-list"><p class="empty-msg">분석 데이터를 기다리는 중...</p></div>
    </div>

    <div class="group-card">
        <div class="group-header"><h2>B. 물리적 인프라 (전력/변압기)</h2></div>
        <div id="list-b" class="item-list"><p class="empty-msg">분석 데이터를 기다리는 중...</p></div>
    </div>

    <div class="group-card">
        <div class="group-header"><h2>C. 글로벌 패권 (방산/자원)</h2></div>
        <div id="list-c" class="item-list"><p class="empty-msg">분석 데이터를 기다리는 중...</p></div>
    </div>

    <div class="group-card">
        <div class="group-header"><h2>D. 조선/중공업 (OPEX)</h2></div>
        <div id="list-d" class="item-list"><p class="empty-msg">분석 데이터를 기다리는 중...</p></div>
    </div>
</div>

<script>
    async function loadAndRender() {
        try {
            // 깃허브 저장소 내의 JSON 파일 경로
            const response = await fetch('./data/analysis_history.json');
            if (!response.ok) throw new Error("JSON 파일을 찾을 수 없습니다.");
            const history = await response.json();
            
            // 1. 중복 제거: 각 종목별로 가장 최신 기록 하나만 남김
            const latestMap = new Map();
            history.forEach(item => {
                latestMap.set(item.company_name, item);
            });
            const latestData = Array.from(latestMap.values());

            // 2. 각 섹션 초기화 (로딩 메시지 제거)
            const groups = ['list-a', 'list-b', 'list-c', 'list-d'];
            groups.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = '';
            });

            // 3. 데이터를 순회하며 해당하는 group_id 섹션에 카드를 추가
            latestData.forEach(item => {
                const targetId = item.group_id || 'list-a'; // 데이터에 group_id가 없으면 A로 기본 할당
                const container = document.getElementById(targetId);
                if (!container) return;

                const card = document.createElement('div');
                card.className = 'item-row';
                
                // 리스크 게이지 기반 색상 선정
                const riskColor = item.conclusion.Gauge_Bar > 70 ? 'var(--strong-buy)' : (item.conclusion.Gauge_Bar > 40 ? 'var(--accent)' : 'var(--buy)');

                card.innerHTML = `
                    <div class="item-top" onclick="this.nextElementSibling.classList.toggle('active')">
                        <div class="corp-name">${item.company_name}</div>
                        <div class="status-pill" style="background:${riskColor}">${item.conclusion.Action}</div>
                    </div>
                    <div class="item-content">
                        <div class="grid-data">
                            <div class="data-box"><span class="label">PER/PBR</span><span class="val">${item.ui_metrics.per_pbr}</span></div>
                            <div class="data-box"><span class="label">RSI</span><span class="val">${item.ui_metrics.rsi}</span></div>
                            <div class="data-box"><span class="label">PEG</span><span class="val">${item.ui_metrics.peg}</span></div>
                            <div class="data-box"><span class="label">OPM YoY</span><span class="val">${item.ui_metrics.opm_yoy}</span></div>
                            <div class="data-box"><span class="label">52주 고점 대비</span><span class="val">${item.ui_metrics.order_backlog}</span></div>
                            <div class="data-box"><span class="label">스 머</span><span class="val">${item.ui_metrics.smart_money}</span></div>
                        </div>
                        <div class="slider-container" style="margin-bottom:15px;">
                            <span class="label" style="text-align:center">리스크 게이지 (${item.conclusion.Gauge_Bar}%)</span>
                            <div class="slider-track"><div class="slider-ptr" style="left:${item.conclusion.Gauge_Bar}%"></div></div>
                        </div>
                        <div class="why-box"><strong>📝 AI 분석 논리:</strong><br>${item.reasoning.join('<br>')}</div>
                        <div class="target-box">🎯 <b>비중 한도(Max Cap):</b> ${item.conclusion.Max_Weight}</div>
                    </div>
                `;
                container.appendChild(card);
            });

            // 4. Andon 비상 알림 배너 처리 (가장 최근 공정 기록 기준)
            const lastEntry = history[history.length - 1];
            if (lastEntry && lastEntry.plan_b_alerts && lastEntry.plan_b_alerts.length > 0) {
                const banner = document.getElementById('andon-banner');
                banner.style.display = 'block';
                banner.innerHTML = "⚠️ <b>시스템 경고:</b> " + lastEntry.plan_b_alerts.join(" | ");
            }
            
            if(lastEntry) {
                document.getElementById('update-ts').innerText = "Last Analytics: " + new Date(lastEntry.timestamp).toLocaleString();
            }

        } catch (err) {
            console.error("Dashboard Load Error:", err);
            document.querySelectorAll('.empty-msg').forEach(el => el.innerText = "데이터 로드 실패. 분석 파일을 찾을 수 없거나 형식이 잘못되었습니다.");
        }
    }

    // 페이지 로드 시 가동
    document.addEventListener("DOMContentLoaded", loadAndRender);
</script>
</body>
</html>
