<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산업 병목 추적 & 투자 매트릭스 v2.2</title>
    <style>
        :root { --bg: #f8f9fa; --text: #212529; --card: #fff; --accent: #d35400; --red: #e74c3c; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --text: #e0e0e0; --card: #262626; } }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .group-title { font-size: 1.4em; font-weight: bold; color: var(--accent); margin: 30px 0 15px 0; border-left: 5px solid var(--accent); padding-left: 10px; }
        details { background: var(--card); border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        summary { padding: 20px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; list-style: none; }
        .action-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.85em; background: #444; color: #fff; }
        .buy { background: var(--red); }
        .content { padding: 0 20px 20px; border-top: 1px solid #333; }
        .hexagon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .m-box { background: rgba(128,128,128,0.1); padding: 12px; border-radius: 8px; text-align: center; }
        .m-label { font-size: 0.7em; color: #888; margin-bottom: 4px; }
        .m-value { font-size: 1em; font-weight: bold; }
        .timing-box { background: rgba(231, 76, 60, 0.08); border: 1px dashed var(--red); border-radius: 8px; padding: 15px; margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center;">🏗️ 산업 병목 & 투자 매트릭스</h1>
        <div id="dashboard"></div>
    </div>
    <script>
        async function render() {
            const data = await (await fetch('data/analysis_history.json?t=' + Date.now())).json();
            const container = document.getElementById('dashboard');
            const groups = {};
            data.forEach(item => { if(!groups[item.group_id]) groups[item.group_id] = []; groups[item.group_id].push(item); });
            Object.keys(groups).sort().forEach(gId => {
                let html = `<div class="group-title">${gId}</div>`;
                groups[gId].forEach(item => {
                    const m = item.ui_metrics;
                    html += `
                        <details>
                            <summary><span>${item.company_name} <small>[${item.stock_code}]</small></span>
                            <span class="action-tag ${item.conclusion.Action.includes('매수')?'buy':''}">${item.conclusion.Action}</span></summary>
                            <div class="content">
                                <div class="hexagon-grid">
                                    <div class="m-box"><div class="m-label">PBR / OPM YoY</div><div class="m-value">${m.pbr_opm}</div></div>
                                    <div class="m-box"><div class="m-label">수주잔고비율</div><div class="m-value">${m.backlog}</div></div>
                                    <div class="m-box"><div class="m-label">재고회전율</div><div class="m-value">${m.turnover}</div></div>
                                    <div class="m-box"><div class="m-label">RSI(14)</div><div class="m-value">${m.rsi}</div></div>
                                    <div class="m-box"><div class="m-label">RS SCORE</div><div class="m-value">${m.rs_score}</div></div>
                                    <div class="m-box"><div class="m-label">SMART MONEY</div><div class="m-value">${m.smart_money}</div></div>
                                </div>
                                <div class="timing-box"><strong>🎯 실전 타점:</strong> ${item.entry_point_guide}</div>
                            </div>
                        </details>`;
                });
                container.innerHTML += html;
            });
        }
        window.onload = render;
    </script>
</body>
</html>
