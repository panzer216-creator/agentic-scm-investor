<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산업 병목 추적 & 투자 매트릭스 v2.2</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #e67e22; --bg: #f5f7fa;
            --card: #ffffff; --border: #dcdde1; --text: #2f3640;
            --strong-buy: #eb4d4b; --buy: #2ecc71; --wait: #95a5a6;
            --box-bg: #f9f9f9; --why-bg: #ecf0f1; --th-bg: #f8f9fa;
            --target-buy-bg: #e8f8f5; --target-sell-bg: #fdedec;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #74b9ff; --accent: #fdcb6e; --bg: #1e272e;
                --card: #2d3436; --border: #4a4a4a; --text: #dfe6e9;
                --box-bg: #353b48; --why-bg: #2d3436; --th-bg: #2d3436;
                --target-buy-bg: rgba(46, 204, 113, 0.15); --target-sell-bg: rgba(235, 77, 75, 0.15);
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); padding: 15px; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header h1 { font-size: 1.4rem; color: var(--primary); }
        
        /* Dashboard Summary Card */
        .info-box { background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--primary); border-radius: 8px; padding: 15px; margin-bottom: 25px; font-size: 0.85rem; }
        
        /* Group Section */
        .group-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 30px; border: 1px solid var(--border); }
        .group-header h2 { font-size: 1.2rem; color: var(--primary); border-left: 6px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }

        /* Item Row */
        .item-row { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card); margin-bottom: 8px; transition: all 0.2s; }
        .item-top { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; }
        .item-top:hover { background: var(--box-bg); }
        .corp-name { font-weight: bold; font-size: 1.05rem; }
        .status-pill { font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; color: #fff; font-weight: bold; }

        .item-content { display: none; padding: 15px; background: var(--box-bg); border-top: 1px solid var(--border); }
        .item-content.active { display: block; }
        
        /* 6 Metrics Grid */
        .grid-data { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .data-box { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 6px; text-align: center; }
        .label { font-size: 0.6rem; color: var(--wait); display: block; margin-bottom: 2px; }
        .val { font-size: 0.85rem; font-weight: bold; color: var(--primary); }

        /* Value Slider */
        .slider-container { margin-bottom: 15px; }
        .slider-track { height: 8px; background: linear-gradient(to right, var(--buy) 0%, #f1c40f 50%, var(--strong-buy) 100%); border-radius: 4px; position: relative; margin: 12px 0; }
        .slider-ptr { width: 4px; height: 16px; background: var(--text); position: absolute; top: -4px; border: 1px solid #fff; transition: left 0.8s ease; }
        
        /* Reasoning Box */
        .why-box { background: var(--why-bg); padding: 12px; border-radius: 8px; font-size: 0.8rem; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .target-box { padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 6px; border: 1px solid var(--border); }
        .target-buy { background: var(--target-buy-bg); border-left: 4px solid var(--buy); }
        .target-sell { background: var(--target-sell-bg); border-left: 4px solid var(--strong-buy); }

        .empty-msg { text-align: center; padding: 20px; color: var(--wait); font-style: italic; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>🏗️ 산업 병목 추적 & 투자 매트릭스 v2.2</h1>
        <p id="update-time" style="font-size: 0.65rem; color: var(--wait); margin-top:5px;"></p>
    </header>

    <div class="info-box">
        <b>💡 다품종 동적 가동:</b> 버킷에서 조달한 종목들을 전략 그룹별로 자동 분류합니다. 각 종목을 <b>클릭</b>하여 상세 SCM 분석 리포트를 확인하세요.
    </div>

    <div class="group-card">
        <div class="group-header"><h2>A. 디지털 고도화 (HBM/AI)</h2></div>
        <div id="list-a" class="item-list"><p class="empty-msg">데이터 로드 중...</p></div>
    </div>

    <div class="group-card">
        <div class="group-header"><h2>B. 물리적 인프라 (전력/변압기)</h2></div>
        <div id="list-b" class="item-list"><p class="empty-msg">데이터 로드 중...</p></div>
    </div>

    <div class="group-card">
        <div class="group-header"><h2>C. 글로벌 패권 (방산/자원)</h2></div>
        <div id="list-c" class="item-list"><p class="empty-msg">데이터 로드 중...</p></div>
    </div>

    <div class="group-card">
        <div class="group-header"><h2>D. 조선/중공업 (OPEX)</h2></div>
        <div id="list-d" class="item-list"><p class="empty-msg">데이터 로드 중...</p></div>
    </div>
</div>

<script>
    // 아코디언 토글 함수
    function toggleAccordion(el) {
        const content = el.nextElementSibling;
        content.classList.toggle('active');
    }

    async function loadDashboard() {
        try {
            const response = await fetch('./data/analysis_history.json');
            if (!response.ok) throw new Error("JSON 파일을 찾을 수 없습니다.");
            const history = await response.json();
            
            // 1. 종목별 최신 데이터만 필터링
            const latestMap = new Map();
            history.forEach(item => latestMap.set(item.company_name, item));
            const latestData = Array.from(latestMap.values());

            // 2. 컨테이너 초기화
            const groups = ['list-a', 'list-b', 'list-c', 'list-d'];
            groups.forEach(id => document.getElementById(id).innerHTML = '');

            // 3. 데이터 렌더링
            latestData.forEach(item => {
                const targetId = item.group_id || 'list-a';
                const container = document.getElementById(targetId);
                if (!container) return;

                const card = document.createElement('div');
                card.className = 'item-row';
                
                // 등급별 색상 매핑
                const action = item.conclusion.Action;
                let pillColor = 'var(--wait)';
                if (action.includes('매수') || action.includes('추천')) pillColor = 'var(--buy)';
                if (action.includes('강력') || action.includes('즉시')) pillColor = 'var(--strong-buy)';

                card.innerHTML = `
                    <div class="item-top" onclick="toggleAccordion(this)">
                        <div class="corp-name">${item.company_name}</div>
                        <div class="status-pill" style="background:${pillColor}">${action}</div>
                    </div>
                    <div class="item-content">
                        <div class="grid-data">
                            <div class="data-box"><span class="label">PER/PBR</span><span class="val">${item.ui_metrics.per_pbr}</span></div>
                            <div class="data-box"><span class="label">RSI(14)</span><span class="val">${item.ui_metrics.rsi}</span></div>
                            <div class="data-box"><span class="label">PEG</span><span class="val">${item.ui_metrics.peg}</span></div>
                            <div class="data-box"><span class="label">OPM YoY</span><span class="val">${item.ui_metrics.opm_yoy}</span></div>
                            <div class="data-box"><span class="label">52주 고점 대비</span><span class="val">${item.ui_metrics.order_backlog}</span></div>
                            <div class="data-box"><span class="label">스마트 머니</span><span class="val">${item.ui_metrics.smart_money}</span></div>
                        </div>

                        <div class="slider-container">
                            <span class="label" style="text-align:center">가치 평가 및 리스크 게이지 (${item.conclusion.Gauge_Bar}%)</span>
                            <div class="slider-track"><div class="slider-ptr" style="left:${item.conclusion.Gauge_Bar}%"></div></div>
                            <div style="display:flex;justify-content:space-between;font-size:0.6rem"><span>Low Risk</span><span>High Risk</span></div>
                        </div>

                        <div class="why-box">
                            <strong>📝 AI 분석 논리:</strong><br>
                            ${item.reasoning.join('<br>')}
                        </div>

                        <div class="target-box target-buy">🎯 <b>비중 한도(Max Cap):</b> ${item.conclusion.Max_Weight}</div>
                        
                        <div style="display:flex; gap:8px; margin-top:10px;">
                            <a href="https://search.naver.com/search.naver?query=${item.company_name}+주가" target="_blank" style="flex:1; text-align:center; font-size:0.7rem; padding:8px; border:1px solid var(--accent); color:var(--accent); text-decoration:none; border-radius:5px;">실시간 차트</a>
                            <a href="https://dart.fss.or.kr/dsab001/main.do?textCrpNm=${item.company_name}" target="_blank" style="flex:1; text-align:center; font-size:0.7rem; padding:8px; border:1px solid var(--accent); color:var(--accent); text-decoration:none; border-radius:5px;">DART 공시</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            const lastUpdate = latestData[latestData.length - 1]?.timestamp;
            if(lastUpdate) document.getElementById('update-time').innerText = "Last Updated: " + new Date(lastUpdate).toLocaleString();

        } catch (err) {
            console.error(err);
            document.querySelectorAll('.empty-msg').forEach(el => el.innerText = "데이터 로드 실패. Actions 분석 로그를 확인하세요.");
        }
    }

    document.addEventListener("DOMContentLoaded", loadDashboard);
</script>
</body>
</html>
